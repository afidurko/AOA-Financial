name: Loop preflight

# Deterministic, no-LLM backstop for the engineering loop.
# Runs the Tier 1 task loop (gate -> repair triage -> ruff + pytest) on a
# schedule and uploads the gate decision, repair queue, and run log as
# artifacts. No secrets, no commits — this is the cheap heartbeat that
# complements the Cursor Cloud automations (which do the LLM reasoning).

on:
  schedule:
    # Daily 13:55 UTC — refresh signal before the Cursor daily-triage automation.
    - cron: "55 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Capture gate decisions
        run: |
          python3 -m aoa.cli repair gate --json > gate-full.json || true
          python3 -m aoa.cli repair gate --for triage --json > gate-triage.json || true
          python3 -m aoa.cli repair gate --for repair --json > gate-repair.json || true
          echo "=== gate (repair) ===" && cat gate-repair.json || true

      - name: Run Tier 1 deterministic loop
        run: python3 -m aoa.cli tasks run tier1

      - name: Upload loop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-preflight
          path: |
            gate-full.json
            gate-triage.json
            gate-repair.json
            loop-run-log.md
            STATE.md
            data/**/repair/queue.json
          if-no-files-found: warn
